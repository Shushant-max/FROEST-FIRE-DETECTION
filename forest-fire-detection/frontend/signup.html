<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Forest Fire Detection</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Sign Up</h1>
            <p>Create an account to track map predictions and 360° forest/fire previews.</p>
            <div class="auth-form">
                <form id="signupForm">
                    <div class="input-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Your name" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create a password" required>
                    </div>
                    <button type="submit" class="auth-submit-btn">Sign Up</button>
                </form>
                <div class="divider"><span>or</span></div>
                <div id="googleButton" class="google-button"></div>
                <div id="authError" class="auth-error" style="display:none;"></div>
                <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => initAuthPage('signup'));</script>
</body>
</html>
